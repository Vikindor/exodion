<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="exodion_pop.css">
  </head>
  <body>
    <div class="popup-shell">
      <header class="popup-header">
        <p class="eyebrow">Google Play privacy view</p>
        <div class="brand-row">
          <div class="brand-title">
            <h1>Exodion</h1>
            <span class="version-badge" id="popupVersion"></span>
          </div>
          <div class="popup-actions">
            <button class="popup-icon-button" id="clearCacheButton" type="button" aria-label="Clear Exodion cache" title="Clear Exodion cache">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 3h6l1 2h4v2H4V5h4l1-2Zm-3 6h12l-1 12H7L6 9Zm3 2v8h2v-8H9Zm4 0v8h2v-8h-2Z"></path>
              </svg>
            </button>
            <button class="popup-icon-button" id="rescanPageButton" type="button" aria-label="Scan current page" title="Scan current page">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M17.7 6.3A8 8 0 0 0 4.3 10H2l3.5 3.5L9 10H6.4a6 6 0 0 1 10-2.3L14 10h8V2l-4.3 4.3ZM6.3 17.7A8 8 0 0 0 19.7 14H22l-3.5-3.5L15 14h2.6a6 6 0 0 1-10 2.3L10 14H2v8l4.3-4.3Z"></path>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main id="popup-content">
        <section class="panel panel-main">
          <div class="panel-head">
            <h2>Current page</h2>
          </div>
          <div id="currentInfo"></div>
        </section>

        <section class="panel panel-filter hidden" id="filter">
          <div class="filter-row">
            <input type="text" name="filter" placeholder="Filter trackers">
            <div class="small-loader"></div>
          </div>
          <ul id="trackMatch-list"></ul>
        </section>

        <section class="panel panel-footer">
          <p class="info">
            Exodion brings
            <a href="https://exodus-privacy.eu.org/" target="_blank">Exodus Privacy</a>
            tracker data into Google Play and is
            <a href="https://github.com/Vikindor/exodion" target="_blank">open source</a>.
          </p>
        </section>
      </main>
    </div>

    <script src="../browser-polyfill.js"></script>
    <script src="../ep-api.js"></script>
    <script src="exodion_pop.js"></script>
  </body>
</html>
