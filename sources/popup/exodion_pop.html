<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="exodion_pop.css">
  </head>
  <body>
    <div class="popup-shell">
      <header class="popup-header">
        <div class="brand-block">
          <p class="eyebrow">Google Play privacy view</p>
          <h1>Exodion</h1>
        </div>
        <span class="version-badge" id="popupVersion"></span>
      </header>

      <main id="popup-content">
        <section class="panel panel-main">
          <div class="panel-head">
            <h2>Current page</h2>
          </div>
          <div id="currentInfo"></div>
        </section>

        <section class="panel panel-filter hidden" id="filter">
          <div class="filter-row">
            <input type="text" name="filter" placeholder="Filter trackers">
            <div class="small-loader"></div>
          </div>
          <ul id="trackMatch-list"></ul>
        </section>

        <section class="panel panel-footer">
          <p class="info">
            Exodion brings
            <a href="https://exodus-privacy.eu.org/" target="_blank">Exodus Privacy</a>
            tracker data into Google Play and is
            <a href="https://github.com/Vikindor/exodion" target="_blank">open source</a>.
          </p>
        </section>
      </main>
    </div>

    <script src="../browser-polyfill.js"></script>
    <script src="../ep-api.js"></script>
    <script src="exodion_pop.js"></script>
  </body>
</html>
