<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="exodion_pop.css">
  </head>
  <body>
    <div class="top-banner">
      <h1>Exodion <span class="exoVersion">v@@version</span></h1>
    </div>
    <div id="popup-content">
      <div id="currentInfo"></div>
      <div id="filter" class="hidden">
        <input type="text" name="filter" placeholder="type filter (e.g facebook)"><div class="small-loader"></div>
        <ul id="trackMatch-list"></ul>
      </div>
      <p class="info">Exodion uses the <a href="https://exodus-privacy.eu.org/" target="_blank">ExodusPrivacy</a> API in order to display directly in the PlayStore page the number of trackers in android applications. This plugin is <a href="https://github.com/FacettsOpen/exodion" target="_blank">open source</a>.</p>
      <a id="test" href="#">Preferences</a>
    </div>
    <script src="../browser-polyfill.js"></script>
    <script src="../ep-api.js"></script>
    <script src="exodion_pop.js"></script>
  </body>
</html>
